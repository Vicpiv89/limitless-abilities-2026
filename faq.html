<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FAQ — Limitless Abilities Awards 2026</title>
  <meta name="description" content="Frequently asked questions about applying for the Limitless Abilities Awards 2026.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://limitlessabilities.com/faq.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Phenomena:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=akrobat:400,700,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#13AEE5; --blue-dark:#0E8FBD; --yellow:#F6C416;
      --navy:#FFFFFF; --ink:#FFFFFF; --muted:#FFFFFF;
      --border:#2A2A2A; --gray-bg:#1B1B1B; --white:#121212;
      --font-d:'Akrobat',sans-serif; --font-b:'Akrobat',sans-serif;
      --r-sm:8px; --r-md:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{font-family:var(--font-b);background:var(--white);color:var(--ink);line-height:1.6;}
    img{display:block;max-width:100%;}
    a{color:inherit;text-decoration:none;}
    .container{max-width:760px;margin:0 auto;padding:0 2rem;}
    .container--wide{max-width:1140px;margin:0 auto;padding:0 2rem;}
    .eyebrow{display:none;}
    .t-h2{font-family:var(--font-d);font-weight:700;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:.02em;text-transform:uppercase;color:var(--navy);line-height:1.12;}
    .rule{display:none;}
    .rule--c{margin-left:auto;margin-right:auto;}
        
    /* NAV */
    .nav{background:rgba(18,18,18,.92);backdrop-filter:blur(14px);padding:1.1rem 0;position:sticky;top:0;z-index:100;border-bottom:none;}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;gap:2rem;position:relative;}
    .nav__logo img{height:44px;display:block;}
    .nav__links{display:flex;align-items:center;gap:2rem;list-style:none;}
    .nav__links a{font-family:var(--font-d);font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;transition:color .2s;}
    .nav__links a.nav-yellow,.nav__links a.nav-yellow.active{color:var(--yellow);}
    .nav__links a:hover,.nav__links a.active{color:var(--blue);}
    .nav__right{display:flex;align-items:center;gap:1rem;}
    .nav__lang{font-family:var(--font-d);font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--blue);cursor:pointer;user-select:none;border:1.5px solid var(--blue);border-radius:4px;padding:.2rem .5rem;transition:background .2s,color .2s;}
    .nav__lang:hover{background:var(--blue);color:#fff;}
    .nav__burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
    .nav__burger span{display:block;width:24px;height:2px;background:var(--muted);border-radius:2px;}
    @media(max-width:768px){
      .nav__links{display:none;}
      .nav__links.open{display:flex;flex-direction:column;align-items:flex-start;gap:0;position:absolute;top:100%;left:0;right:0;background:rgba(13,17,22,.97);padding:.5rem 0;border-bottom:1px solid var(--border);z-index:99;}
      .nav__links.open li{width:100%;padding:.7rem 2rem;border-bottom:1px solid rgba(255,255,255,.05);}
      .nav__links.open a{font-size:.9rem;}
      .nav__burger{display:flex;}
    }

    /* HERO */
    .page-hero{background:var(--white);padding:4rem 0 3.5rem;text-align:center;border-bottom:none;}
    .page-hero__icon{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:rgba(19,174,229,.1);margin:0 auto 1.2rem;}

    /* ACCORDION */
    .faq-list{margin-top:3rem;display:flex;flex-direction:column;gap:.75rem;}
    .faq-item{background:var(--gray-bg);border:none;border-radius:var(--r-md);overflow:hidden;}
    .faq-q{width:100%;display:flex;align-items:flex-start;gap:1rem;padding:1.4rem 1.6rem;background:none;border:none;cursor:pointer;text-align:left;}
    .faq-q:hover .faq-q__text{color:var(--navy);}
    .faq-q__num{font-family:var(--font-d);font-weight:700;font-size:.8rem;color:var(--yellow);min-width:24px;padding-top:.1rem;}
    .faq-q__text{font-family:var(--font-d);font-weight:700;font-size:1rem;color:var(--ink);letter-spacing:.01em;flex:1;line-height:1.4;}
    .faq-q__chevron{width:16px;height:16px;color:var(--muted);flex-shrink:0;transition:transform .25s;margin-top:.15rem;}
    .faq-item.open .faq-q__chevron{transform:rotate(180deg);}
    .faq-a{display:none;padding:0 1.6rem 1.4rem 3.5rem;}
    .faq-a p{font-size:.9rem;color:#fff;line-height:1.7;}
    .faq-a p+p{margin-top:.6rem;}
    .faq-item.open .faq-a{display:block;}

    /* FOOTER */
    .footer{background:var(--white);padding:3rem 0;border-top:none;}
    .footer-inner{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;}
    .footer-logo img{height:36px;opacity:.7;}
    .footer-back{font-family:var(--font-d);font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .footer-back:hover{color:var(--blue);}
    .footer-copy{font-size:.75rem;color:var(--muted);opacity:.45;}
  </style>
</head>
<body>

<nav class="nav">
  <div class="container--wide">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><img src="assets/logo-event-ua.png" class="js-event-logo" alt="Limitless Abilities" style="height:36px;width:auto;"></a>
      <ul class="nav__links" id="navLinks">
        <li><a href="index.html#about" id="nav-about">About</a></li>
        <li><a href="index.html#speakers" id="nav-speakers">Speakers</a></li>
        <li><a href="index.html#program" id="nav-program">Program</a></li>
        <li><a href="index.html#registration" id="nav-register">Register</a></li>
        <li><a href="awards.html" class="nav-yellow" id="nav-awards">Awards</a></li>
        <li><a href="nominations.html" class="nav-yellow" id="nav-nominate">Apply</a></li>
      </ul>
      <div class="nav__right">
        <span class="nav__lang" id="langToggle">UA</span>
      </div>
      <button class="nav__burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<section class="page-hero">
  <div class="container">
    <h1 class="t-h2" style="color:#fff;margin:.5rem 0;" id="hero-h1">FAQ</h1>
    <div class="rule rule--c" style="margin:1rem auto;"></div>
    <p style="color:rgba(255,255,255,.6);font-size:.9rem;max-width:480px;margin:0 auto;" id="hero-sub">Common questions about submitting a nomination for the Limitless Abilities Awards 2026.</p>
  </div>
</section>

<section style="padding:4rem 0 6rem;">
  <div class="container">
    <div class="faq-list" id="faqList"></div>
    <div style="margin-top:2.5rem;text-align:center;">
      <p style="font-size:.85rem;color:var(--muted);" id="more-q">Still have questions? Email us at <a href="mailto:info@protezhub.com" style="color:var(--blue);">info@protezhub.com</a></p>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container--wide">
    <div class="footer-inner">
      <a href="nominations.html" class="footer-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="back-text">All nominations</span>
      </a>
      <div class="footer-logo"><img src="assets/logo-event-ua.png" class="js-event-logo" alt="Limitless Abilities" style="height:34px;width:auto;opacity:1;"></div>
      <div class="footer-copy">&copy; 2026 Protez Hub</div>
    </div>
  </div>
</footer>

<script>
const QA = [
  {
    q: 'Who organizes the Limitless Abilities Awards?',
    a: 'The Award is founded and organized by CO CF "Protez Hub" (Благодійна організація «Благодійний фонд "Протез Хаб"»).',
    qUa: 'Хто є організатором премії Limitless Abilities Awards?',
    aUa: 'Премія заснована та проводиться Благодійною організацією «Благодійний фонд "Протез Хаб"».'
  },
  {
    q: 'What language must application materials be submitted in?',
    a: 'All application materials — including text descriptions of criteria and supporting documents — must be submitted exclusively in English. Ensuring an accurate translation is the applicant\'s responsibility. Field labels on the site are duplicated in both languages for ease of completion.',
    qUa: 'Якою мовою необхідно подавати матеріали заявки?',
    aUa: 'Відповідно до Регламенту, всі матеріали заявки, текстові описи критеріїв та підтверджувальні документи повинні бути надані виключно англійською мовою. Забезпечення точного перекладу є обов\'язком заявника. Назви полів на сайті продубльовані двома мовами для зручності заповнення.'
  },
  {
    q: 'Why is the evaluation anonymized, and how does it work?',
    a: 'To ensure full objectivity and impartiality, the International Expert Jury receives applications in a completely anonymized form. Text descriptions of criteria and uploaded files must not contain your name, company name, logos, or any identifying links. All contact and identifying information is entered in a separate, closed section of the form and is never shared with the jury.',
    qUa: 'Чому оцінювання є анонімним і як це працює?',
    aUa: 'Для забезпечення повної об\'єктивності та неупередженості Міжнародне експертне журі отримує заявки в повністю анонімізованому вигляді. Текстові описи критеріїв та завантажені файли не повинні містити вашого імені, назви компанії, логотипів чи посилань. Усі контактні та ідентифікаційні дані вносяться в окремий закритий розділ форми і журі не передаються.'
  },
  {
    q: 'What happens if identifying details are found in the application?',
    a: 'If identifying information is discovered during the technical review, the Organizer has the right to either hide or remove that information without altering the substance of the application, or return the form to the applicant for revision — provided the submission deadline has not yet passed.',
    qUa: 'Що станеться, якщо в описі критеріїв буде виявлено згадку про номінанта чи логотип закладу?',
    aUa: 'У разі виявлення ідентифікувальних даних під час технічної перевірки Організатор має право або приховати чи вилучити цю інформацію самостійно без зміни змісту заявки, або повернути форму заявнику на доопрацювання — за умови, що строк прийому заявок ще не завершився.'
  },
  {
    q: 'How are applications scored?',
    a: 'Each member of the International Expert Jury evaluates applications individually and independently based on the approved criteria. Each nomination has 4 criteria, each accounting for exactly 25% of the total score. The maximum total score for an application is 100 points.',
    qUa: 'Як розподіляються бали під час оцінювання?',
    aUa: 'Кожен член Міжнародного експертного журі оцінює заявки індивідуально та незалежно за затвердженими критеріями. У кожній номінації є 4 критерії, кожен з яких формує рівно 25% від загальної оцінки. Максимальний сумарний бал за заявку становить 100 балів.'
  },
  {
    q: 'What counts as valid supporting materials?',
    a: 'You may submit any materials that correspond to the examples listed in the criteria table for your nomination. The examples provided are for guidance only and are not exhaustive. The key requirement is that all materials are free of personal and organizational identifiers.',
    qUa: 'Які документи можна завантажувати як підтверджувальні матеріали?',
    aUa: 'Ви можете завантажити будь-які матеріали, що відповідають переліку прикладів з таблиці критеріїв для вашої номінації. Наведені приклади є орієнтовними та не є вичерпними. Головне — щоб вони були очищені від особистих та корпоративних ідентифікаторів.'
  },
  {
    q: 'Who is responsible for patient data consents in the application?',
    a: 'The applicant bears full and sole responsibility for the legality of using all submitted materials, including personal data, patient information, and multimedia content. By submitting the application, you confirm that you hold all required consents and permissions.',
    qUa: 'Хто несе відповідальність за згоди пацієнтів або фото у заявці?',
    aUa: 'Заявник несе повну одноосібну відповідальність за законність використання всіх наданих матеріалів, включаючи персональні дані, інформацію про пацієнтів та мультимедіа. Подаючи заявку, ви підтверджуєте наявність усіх необхідних згод та дозволів.'
  }
];

let lang = 'en';

function buildFaq() {
  const list = document.getElementById('faqList');
  list.innerHTML = '';
  QA.forEach((item, i) => {
    const q = lang === 'ua' ? item.qUa : item.q;
    const a = lang === 'ua' ? item.aUa : item.a;
    const el = document.createElement('div');
    el.className = 'faq-item';
    el.innerHTML = `
      <button class="faq-q">
        <span class="faq-q__num">${String(i+1).padStart(2,'0')}</span>
        <span class="faq-q__text">${q}</span>
        <svg class="faq-q__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="faq-a"><p>${a}</p></div>
    `;
    el.querySelector('.faq-q').addEventListener('click', () => el.classList.toggle('open'));
    list.appendChild(el);
  });
}

function updateLang(l) {
  lang = l;
  const isUa = lang === 'ua';
  document.getElementById('langToggle').textContent = isUa ? 'EN' : 'UA';
  document.getElementById('nav-about').textContent = isUa ? 'Про захід' : 'About';
  document.getElementById('nav-speakers').textContent = isUa ? 'Спікери' : 'Speakers';
  document.getElementById('nav-program').textContent = isUa ? 'Програма' : 'Program';
  document.getElementById('nav-register').textContent = isUa ? 'Реєстрація' : 'Register';
  document.getElementById('nav-awards').textContent = isUa ? 'Премія' : 'Awards';
  document.getElementById('nav-nominate').textContent = isUa ? 'Подати заявку' : 'Apply';
  document.querySelectorAll('.js-event-logo').forEach(img => { img.src = isUa ? 'assets/logo-event-ua.png' : 'assets/logo-event-en.png'; });
  document.getElementById('hero-sub').textContent = isUa
    ? 'Відповіді на найпоширеніші запитання про участь у премії, подання заявки та процес оцінювання.'
    : 'Answers to the most common questions about participating in the award, applying, and the evaluation process.';
  document.getElementById('back-text').textContent = isUa ? 'Усі номінації' : 'All nominations';
  document.getElementById('more-q').innerHTML = isUa
    ? 'Не знайшли відповідь на своє запитання? Напишіть нам на <a href="mailto:info@protezhub.com" style="color:var(--yellow);">info@protezhub.com</a>'
    : "Didn't find the answer to your question? Email us at <a href=\"mailto:info@protezhub.com\" style=\"color:var(--yellow);\">info@protezhub.com</a>";
  buildFaq();
}

updateLang('ua');
document.getElementById('langToggle').addEventListener('click', () => updateLang(lang === 'en' ? 'ua' : 'en'));
document.getElementById('burger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
</script>
</body>
</html>
