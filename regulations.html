  <style>
    :root {
      --blue:#13AEE5; --blue-dark:#0E8FBD; --yellow:#F6C416;

      --font-d:'Akrobat',sans-serif; --font-b:'Akrobat',sans-serif;
      --r-sm:8px; --r-md:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{font-family:var(--font-b);background:var(--white);color:var(--ink);line-height:1.6;}
    img{display:block;max-width:100%;}
    a{color:var(--blue);}
    .container{max-width:820px;margin:0 auto;padding:0 2rem;}
    .container--wide{max-width:1140px;margin:0 auto;padding:0 2rem;}
    .eyebrow{display:none;}
    .t-h2{font-family:var(--font-d);font-weight:700;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:.02em;text-transform:uppercase;color:var(--navy);line-height:1.12;}
    .rule{display:none;}
    .rule--c{margin-left:auto;margin-right:auto;}
        
    /* NAV */
    .nav{background:rgba(18,18,18,.92);backdrop-filter:blur(14px);padding:1.1rem 0;position:sticky;top:0;z-index:100;border-bottom:none;}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;gap:2rem;position:relative;}
    .nav__logo img{height:44px;display:block;}
    .nav__links{display:flex;align-items:center;gap:2rem;list-style:none;}
    .nav__links a{font-family:var(--font-d);font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;transition:color .2s;}
    .nav__links a.nav-yellow,.nav__links a.nav-yellow.active{color:var(--yellow);}
    .nav__links a:hover,.nav__links a.active{color:var(--blue);}
    .nav__right{display:flex;align-items:center;gap:1rem;}
    .nav__lang{font-family:var(--font-d);font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--blue);cursor:pointer;user-select:none;border:1.5px solid var(--blue);border-radius:4px;padding:.2rem .5rem;transition:background .2s,color .2s;}
    .nav__lang:hover{background:var(--blue);color:#fff;}
    .nav__burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
    .nav__burger span{display:block;width:24px;height:2px;background:var(--muted);border-radius:2px;}
    @media(max-width:768px){
      .nav__links{display:none;}
      .nav__links.open{display:flex;flex-direction:column;align-items:flex-start;gap:0;position:absolute;top:100%;left:0;right:0;background:rgba(13,17,22,.97);padding:.5rem 0;border-bottom:1px solid var(--border);z-index:99;}
      .nav__links.open li{width:100%;padding:.7rem 2rem;border-bottom:1px solid rgba(255,255,255,.05);}
      .nav__links.open a{font-size:.9rem;}
      .nav__burger{display:flex;}
    }

    /* HERO */
    .page-hero{background:var(--white);padding:4rem 0 1rem;text-align:center;border-bottom:none;}
    .page-hero__icon{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:rgba(19,174,229,.1);margin:0 auto 1.2rem;}

    /* TOC */
    .toc{background:var(--gray-bg);border:none;border-radius:var(--r-md);padding:1.6rem 1.8rem;margin:0.5rem 0 2rem;}
    .toc__title{font-family:var(--font-d);font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;margin-bottom:1rem;}
    .toc__list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:.3rem .5rem;}
    @media(max-width:500px){.toc__list{grid-template-columns:1fr;}}
    .toc__list a{font-size:.82rem;color:#fff;transition:color .2s;}
    .toc__list a:hover{color:var(--blue);}

    /* ACCORDION */
    .acc-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:4rem;}
    .acc-item{background:var(--gray-bg);border:none;border-radius:var(--r-md);overflow:hidden;}
    .acc-hd{width:100%;display:flex;align-items:flex-start;gap:1rem;padding:1.3rem 1.5rem;background:none;border:none;cursor:pointer;text-align:left;}
    .acc-hd:hover .acc-hd__title{color:var(--navy);}
    .acc-hd__num{font-family:var(--font-d);font-weight:700;font-size:.75rem;color:var(--yellow);min-width:28px;padding-top:.15rem;flex-shrink:0;}
    .acc-hd__title{font-family:var(--font-d);font-weight:700;font-size:.95rem;color:var(--ink);letter-spacing:.01em;flex:1;line-height:1.4;}

    .acc-body{display:none;padding:0 1.5rem 1.4rem 3.8rem;}

    .acc-body p{font-size:.88rem;color:#fff;line-height:1.72;}
    .acc-body p+p{margin-top:.55rem;}
    .acc-body ul{list-style:none;display:flex;flex-direction:column;gap:.3rem;margin-top:.5rem;}
    .acc-body li{font-size:.87rem;color:#fff;padding-left:1rem;position:relative;line-height:1.55;}
    .acc-body li::before{content:'·';position:absolute;left:0;color:var(--yellow);}

    /* EXPAND ALL */
    .expand-all{font-family:var(--font-d);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .2s;padding:0;}
    .expand-all:hover{color:var(--blue);}

    /* FOOTER */
    .footer{background:var(--white);padding:3rem 0;border-top:none;}
    .footer-inner{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;}
    .footer-logo img{height:36px;opacity:.7;}
    .footer-back{font-family:var(--font-d);font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .footer-back:hover{color:var(--blue);}
    .footer-copy{font-size:.75rem;color:var(--muted);opacity:.45;}
  </style>
</head>

let lang = 'en';
let allOpen = false;

function renderBody(items) {
  return items.map(item => {
    if (item.type === 'p') return `<p>${item.t}</p>`;
    if (item.type === 'ul') return `<ul>${item.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    return '';
  }).join('');
}

function build() {
  const toc = document.getElementById('tocList');
  const acc = document.getElementById('accList');
  toc.innerHTML = '';
  acc.innerHTML = '';

  REGS.forEach((s, i) => {
    const h = lang === 'ua' ? s.hUa : s.h;
    const body = lang === 'ua' ? s.bodyUa : s.body;

    const li = document.createElement('li');
    li.innerHTML = `<a href="#sec-${i+1}">${h}</a>`;
    toc.appendChild(li);

    const item = document.createElement('div');
    item.className = 'acc-item';
    item.id = `sec-${i+1}`;
    item.innerHTML = `
      <button class="acc-hd">
        <span class="acc-hd__num">${String(i+1).padStart(2,'0')}</span>
        <span class="acc-hd__title">${h.replace(/^\d+\.\s*/,'')}</span>
        <svg class="acc-hd__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="acc-body">${renderBody(body)}</div>
    `;
    item.querySelector('.acc-hd').addEventListener('click', () => item.classList.toggle('open'));
    acc.appendChild(item);
  });

  document.getElementById('toc-title').textContent = lang === 'ua' ? 'Зміст' : 'Contents';
  document.getElementById('expandBtn').textContent = lang === 'ua' ? 'Розгорнути всі' : 'Expand all';
}

function updateLang(l) {
  lang = l;
  const isUa = lang === 'ua';
  document.getElementById('langToggle').textContent = isUa ? 'EN' : 'UA';
  document.getElementById('nav-about').textContent = isUa ? 'Про захід' : 'About';
  document.getElementById('nav-speakers').textContent = isUa ? 'Спікери' : 'Speakers';
  document.getElementById('nav-program').textContent = isUa ? 'Програма' : 'Program';
  document.getElementById('nav-register').textContent = isUa ? 'Реєстрація' : 'Register';
  document.getElementById('nav-awards').textContent = isUa ? 'Премія' : 'Awards';
  document.getElementById('nav-nominate').textContent = isUa ? 'Подати заявку' : 'Apply';
  document.querySelectorAll('.js-event-logo').forEach(img => { img.src = isUa ? 'assets/logo-event-ua.png' : 'assets/logo-event-en.png'; });
  document.getElementById('hero-h1').textContent = isUa ? 'Регламент премії' : 'Award Regulations';
  document.getElementById('hero-sub').textContent = isUa
    ? 'Офіційний документ премії Limitless Abilities Awards 2026, організованої БО БФ «Протез Хаб». Містить умови участі, порядок проведення та процедуру оцінювання заявок.'
    : 'The official document of the Limitless Abilities Awards 2026, organized by CO CF "Protez Hub". Contains the terms of participation, award procedure, and the application evaluation process.';
  document.getElementById('back-text').textContent = isUa ? 'Усі номінації' : 'All nominations';
  build();
}

updateLang('ua');

document.getElementById('expandBtn').addEventListener('click', () => {
  allOpen = !allOpen;
  document.querySelectorAll('.acc-item').forEach(el => el.classList.toggle('open', allOpen));
  document.getElementById('expandBtn').textContent = allOpen
    ? (lang === 'ua' ? 'Згорнути всі' : 'Collapse all')
    : (lang === 'ua' ? 'Розгорнути всі' : 'Expand all');
});

document.getElementById('langToggle').addEventListener('click', () => updateLang(lang === 'en' ? 'ua' : 'en'));
document.getElementById('burger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));

// TOC anchor clicks open the item
document.getElementById('tocList').addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  e.preventDefault();
  const target = document.querySelector(a.getAttribute('href'));
  if (target) { target.classList.add('open'); target.scrollIntoView({behavior:'smooth',block:'start'}); }
});
</script>
