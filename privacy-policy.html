<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Privacy Policy — Limitless Abilities Awards 2026</title>
  <meta property="og:image" content="https://limitlessabilities.net/og-image.jpg">
  <meta name="description" content="Privacy and data protection policy for the Limitless Abilities Awards 2026, organized by Protez Hub.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://limitlessabilities.net/privacy-policy.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Phenomena:wght@400;700&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=akrobat:400,700,800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#13AEE5; --blue-dark:#0E8FBD; --yellow:#F6C416;
      --navy:#FFFFFF; --ink:#FFFFFF; --muted:#FFFFFF;
      --border:#2A2A2A; --gray-bg:#1B1B1B; --white:#121212;
      --font-d:'Akrobat',sans-serif; --font-b:'Akrobat',sans-serif;
      --r-sm:8px; --r-md:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{font-family:var(--font-b);background:var(--white);color:var(--ink);line-height:1.6;}
    img{display:block;max-width:100%;}
    a{color:var(--blue);}
    .container{max-width:760px;margin:0 auto;padding:0 2rem;}
    .container--wide{max-width:1140px;margin:0 auto;padding:0 2rem;}
    .eyebrow{display:none;}
    .t-h2{font-family:var(--font-d);font-weight:700;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:.02em;text-transform:uppercase;color:var(--navy);line-height:1.12;}
    .rule{display:none;}
    .rule--c{margin-left:auto;margin-right:auto;}
        
    /* NAV */
    .nav{background:rgba(18,18,18,.92);backdrop-filter:blur(14px);padding:1.1rem 0;position:sticky;top:0;z-index:100;border-bottom:none;}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;gap:2rem;position:relative;}
    .nav__logo img{height:44px;display:block;}
    .nav__links{display:flex;align-items:center;gap:2rem;list-style:none;}
    .nav__links a{font-family:var(--font-d);font-weight:600;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;transition:color .2s;}
    .nav__links a.nav-yellow,.nav__links a.nav-yellow.active{color:var(--yellow);}
    .nav__links a:hover{color:var(--blue);}
    .nav__right{display:flex;align-items:center;gap:1rem;}
    .nav__lang{font-family:var(--font-d);font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--blue);cursor:pointer;user-select:none;border:1.5px solid var(--blue);border-radius:4px;padding:.2rem .5rem;transition:background .2s,color .2s;}
    .nav__lang:hover{background:var(--blue);color:#fff;}
    .nav__burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
    .nav__burger span{display:block;width:24px;height:2px;background:var(--muted);border-radius:2px;}
    @media(max-width:768px){
      .nav__links{display:none;}
      .nav__links.open{display:flex;flex-direction:column;align-items:flex-start;gap:0;position:absolute;top:100%;left:0;right:0;background:rgba(13,17,22,.97);padding:.5rem 0;border-bottom:1px solid var(--border);z-index:99;}
      .nav__links.open li{width:100%;padding:.7rem 2rem;border-bottom:1px solid rgba(255,255,255,.05);}
      .nav__links.open a{font-size:.9rem;}
      .nav__burger{display:flex;}
    }

    /* HERO */
    .page-hero{background:var(--white);padding:4rem 0 3.5rem;text-align:center;border-bottom:none;}
    .page-hero__icon{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:rgba(19,174,229,.1);margin:0 auto 1.2rem;}

    /* DOC BODY */
    .doc-body{padding:4rem 0 6rem;}
    .doc-section{margin-bottom:2.5rem;}
    .doc-section h2{font-family:var(--font-d);font-weight:700;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;color:#fff;margin-bottom:.9rem;}
    .doc-section p{font-size:.92rem;color:#fff;line-height:1.75;}
    .doc-section p+p{margin-top:.7rem;}
    .doc-divider{border:none;border-top:1px solid var(--border);margin:2.5rem 0;}

    /* FOOTER */
    .footer{background:var(--white);padding:3rem 0;border-top:none;}
    .footer-inner{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;}
    .footer-logo img{height:36px;opacity:.7;}
    .footer-back{font-family:var(--font-d);font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .footer-back:hover{color:var(--blue);}
    .footer-copy{font-size:.75rem;color:var(--muted);opacity:.45;}
  </style>
</head>
<body>

<nav class="nav">
  <div class="container--wide">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><img src="assets/logo-event-ua.png" class="js-event-logo" alt="Limitless Abilities" style="height:36px;width:auto;"></a>
      <ul class="nav__links" id="navLinks">
        <li><a href="index.html#about" id="nav-about">About</a></li>
        <li><a href="index.html#speakers" id="nav-speakers">Speakers</a></li>
        <li><a href="index.html#program" id="nav-program">Program</a></li>
        <li><a href="index.html#registration" id="nav-register">Register</a></li>
        <li><a href="awards.html" class="nav-yellow" id="nav-awards">Awards</a></li>
        <li><a href="nominations.html" class="nav-yellow" id="nav-nominate">Apply</a></li>
      </ul>
      <div class="nav__right">
        <span class="nav__lang" id="langToggle">UA</span>
      </div>
      <button class="nav__burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<section class="page-hero">
  <div class="container">
    <h1 class="t-h2" style="color:#fff;margin:.5rem 0;" id="hero-h1">Privacy Policy</h1>
    <div class="rule rule--c" style="margin:1rem auto;"></div>
    <p style="color:rgba(255,255,255,.6);font-size:.9rem;max-width:540px;margin:0 auto;" id="hero-sub">Privacy and data protection policy for applicants of the Limitless Abilities Awards 2026.</p>
  </div>
</section>

<section class="doc-body">
  <div class="container" id="docContent"></div>
</section>

<footer class="footer">
  <div class="container--wide">
    <div class="footer-inner">
      <a href="index.html" class="footer-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span id="back-text">Back to main site</span>
      </a>
      <div class="footer-logo"><img src="assets/logo-event-ua.png" class="js-event-logo" alt="Limitless Abilities" style="height:34px;width:auto;opacity:1;"></div>
      <div class="footer-copy">&copy; 2026 Protez Hub</div>
    </div>
  </div>
</footer>

<script>
const SECTIONS = [
  {
    h: '1. General Provisions',
    hUa: '1. Загальні положення',
    p: ['This Privacy Policy governs the collection, processing, anonymization, and protection of personal data provided by Applicants when submitting applications for the Limitless Abilities Awards through the official website.','The data controller is CO CF "Protez Hub". By submitting an application, the Applicant consents to this Policy and the Rules of Participation.'],
    pUa: ['Ця Політика конфіденційності регулює порядок збору, обробки, анонімізації та захисту персональних даних, які надаються Заявниками під час подання заявок на участь у премії Limitless Abilities Awards через офіційний вебсайт.','Володільцем персональних даних є Благодійна організація «Благодійний фонд "Протез Хаб"». Подання заявки є згодою Заявника на цю Політику та Правила участі.']
  },
  {
    h: '2. Categories of Processed Data',
    hUa: '2. Категорії даних, що обробляються',
    p: ['The Organizer processes two categories of information.','<strong style="color:var(--ink)">Identification and contact data (closed block):</strong> full name of the Nominee, name of the organization or institution, full name of the contact person, phone numbers, email addresses.','<strong style="color:var(--ink)">Assessment and supporting materials (anonymized block):</strong> text descriptions of professional achievements and materials listed in the criteria table.'],
    pUa: ['Організатор здійснює обробку двох категорій інформації.','<strong style="color:var(--ink)">Ідентифікаційні та контактні дані у закритому блоці:</strong> ПІБ Номінанта, назва організації чи закладу, ПІБ контактної особи, номери телефонів, адреси електронної пошти.','<strong style="color:var(--ink)">Оціночні та підтверджувальні матеріали в анонімізованому блоці:</strong> текстові описи професійних досягнень та матеріали, зазначені у таблиці критеріїв.']
  },
  {
    h: '3. Purpose of Processing',
    hUa: '3. Мета обробки та правові підстави',
    p: ['Personal data is processed exclusively for the purpose of organizing, conducting, technically reviewing, and providing informational support for the Award, in accordance with the Law of Ukraine "On Personal Data Protection" and other applicable regulatory acts.'],
    pUa: ['Обробка персональних даних здійснюється виключно з метою організації, проведення, технічної перевірки та інформаційного супроводу Премії відповідно до Закону України «Про захист персональних даних» та інших застосовних нормативно-правових актів.']
  },
  {
    h: '4. Anonymization and Jury Access',
    hUa: '4. Режим анонімізації та доступ Міжнародного експертного журі',
    p: ['To ensure impartial evaluation, CO CF "Protez Hub" enforces a strict anonymization regime. No contact or identifying data from the application form is shared with members of the International Expert Jury.','Jury members receive access only to depersonalized criteria descriptions and supporting materials. All jury members conduct evaluations under principles of full independence, objectivity, and confidentiality.'],
    pUa: ['Для забезпечення неупередженості оцінювання Благодійна організація «Благодійний фонд "Протез Хаб"» впроваджує режим суворої анонімізації. Жоден контактний або ідентифікаційний фрагмент даних з форми заявки не передається членам Міжнародного експертного журі.','Члени журі отримують доступ лише до деперсоналізованих описів критеріїв та підтверджувальних матеріалів. Усі члени журі здійснюють оцінювання на принципах повної незалежності, об\'єктивності та конфіденційності.']
  },
  {
    h: '5. Confidentiality of Patient Records',
    hUa: '5. Конфіденційність медичної інформації та даних пацієнтів',
    p: ['Given the specifics of the prosthetics, orthotics, and rehabilitation sector, the Organizer ensures heightened protection of data constituting medical confidentiality.','The Applicant guarantees that all materials relating to clinical cases, photos, or videos have been submitted on the basis of proper written or digital consents from the patients or their representatives, in accordance with the requirements of the criteria table.'],
    pUa: ['Враховуючи специфіку сфери протезування, ортезування та реабілітації, Організатор забезпечує підвищений захист даних, що становлять медичну таємницю.','Заявник гарантує, що всі надані матеріали стосовно клінічних кейсів, фото чи відео завантажені на підставі належних письмових або цифрових згод самих пацієнтів чи їхніх представників згідно з вимогами таблиці критеріїв.']
  },
  {
    h: '6. Scope of Material Use',
    hUa: '6. Використання матеріалів та інтелектуальна власність',
    p: ['CO CF "Protez Hub" does not acquire proprietary intellectual property rights to submitted materials, projects, or developments.','The Organizer has the right to use application materials free of charge solely for non-commercial informational and promotional purposes related to promoting the Award, with mandatory attribution of authorship, unless otherwise agreed with the Applicant.'],
    pUa: ['Благодійна організація «Благодійний фонд "Протез Хаб"» не набуває майнових прав інтелектуальної власності на подані матеріали, проєкти чи розробки.','Організатор має право безоплатно використовувати матеріали заявки виключно в некомерційних інформаційних та промо-цілях, пов\'язаних із популяризацією Премії, із обов\'язковим зазначенням авторства, якщо інше не погоджено із заявником.']
  },
  {
    h: '7. Data Retention and Safeguards',
    hUa: '7. Термін зберігання та захист даних',
    p: ['Personal data is stored by the Organizer only to the extent and for the duration necessary to conduct the Award, finalize results, and maintain the official archive of nominees.','CO CF "Protez Hub" applies modern technical and organizational methods to prevent leakage, loss, or unauthorized access to closed data blocks.'],
    pUa: ['Персональні дані зберігаються Організатором лише в обсязі та протягом строку, необхідного для проведення Премії, підбиття підсумків та ведення офіційного архіву номінантів.','Благодійна організація «Благодійний фонд "Протез Хаб"» застосовує сучасні технічні та організаційні методи для запобігання витоку, втраті або несанкціонованому доступу до закритих блоків даних.']
  },
  {
    h: '8. Rights of Data Subjects',
    hUa: '8. Права Заявників та Номінантів',
    p: ['Data subjects hold all rights provided by Ukrainian legislation, including the right to correction of data, clarification of information during technical review, and the right to withdraw consent to data processing.','Withdrawal of consent during the active stages of the Award leads to the automatic cancellation and rejection of the relevant application.','For questions regarding your personal data, contact us at: <a href="mailto:info@protezhub.com">info@protezhub.com</a>'],
    pUa: ['Суб\'єкти персональних даних мають усі права, передбачені законодавством України, включаючи право на виправлення даних, уточнення інформації під час технічної перевірки, а також право відкликати згоду на обробку даних.','Відкликання згоди під час проведення етапів Премії веде до автоматичного скасування та відхилення відповідної заявки.','З питань щодо персональних даних звертайтеся на: <a href="mailto:info@protezhub.com">info@protezhub.com</a>']
  }
];

let lang = 'en';

function buildDoc() {
  const el = document.getElementById('docContent');
  el.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const sec = document.createElement('div');
    sec.className = 'doc-section';
    const h = lang === 'ua' ? s.hUa : s.h;
    const paras = lang === 'ua' ? s.pUa : s.p;
    sec.innerHTML = `<h2>${h}</h2>${paras.map(p => `<p>${p}</p>`).join('')}`;
    el.appendChild(sec);
    if (i < SECTIONS.length - 1) el.insertAdjacentHTML('beforeend', '<hr class="doc-divider">');
  });
}

function updateLang(l) {
  lang = l;
  const isUa = lang === 'ua';
  document.getElementById('langToggle').textContent = isUa ? 'EN' : 'UA';
  document.getElementById('nav-about').textContent = isUa ? 'Про захід' : 'About';
  document.getElementById('nav-speakers').textContent = isUa ? 'Спікери' : 'Speakers';
  document.getElementById('nav-program').textContent = isUa ? 'Програма' : 'Program';
  document.getElementById('nav-register').textContent = isUa ? 'Реєстрація' : 'Register';
  document.getElementById('nav-awards').textContent = isUa ? 'Премія' : 'Awards';
  document.getElementById('nav-nominate').textContent = isUa ? 'Подати заявку' : 'Apply';
  document.querySelectorAll('.js-event-logo').forEach(img => { img.src = isUa ? 'assets/logo-event-ua.png' : 'assets/logo-event-en.png'; });
  document.getElementById('hero-h1').textContent = isUa ? 'Політика конфіденційності' : 'Privacy Policy';
  document.getElementById('hero-sub').textContent = isUa
    ? 'Документ визначає, які персональні дані ми збираємо, як їх використовуємо, зберігаємо та захищаємо під час участі в Limitless Abilities Awards 2026.'
    : 'This document defines what personal data we collect and how we use, store, and protect it during participation in the Limitless Abilities Awards 2026.';
  document.getElementById('back-text').textContent = isUa ? 'На головну сторінку' : 'Back to main site';
  buildDoc();
}

updateLang('ua');
document.getElementById('langToggle').addEventListener('click', () => updateLang(lang === 'en' ? 'ua' : 'en'));
document.getElementById('burger').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
</script>
</body>
</html>
